name: Publish Emby Docker Image

on:
  workflow_dispatch:
    inputs:
      emby_tag:
        description: "Specific emby/embyserver tag to mirror"
        required: false
        default: ""
      release_tag:
        description: "Specific EmbyPatch release tag to bundle"
        required: false
        default: ""
      force_publish:
        description: "Publish even if source digest and release are unchanged"
        required: false
        default: "true"
  schedule:
    # GitHub Actions schedule uses UTC. 22:02 UTC = 06:02 Asia/Shanghai, 10:02 UTC = 18:02 Asia/Shanghai.
    - cron: "2 22 * * *"
    - cron: "2 10 * * *"

permissions:
  contents: write

env:
  IMAGE_REPO: honue/embyserver
  SOURCE_REPO: emby/embyserver
  DLL_RELEASE_REPO: ${{ vars.DLL_RELEASE_REPO || 'honue/EmbyPatch' }}
  DLL_ASSET_NAME: EmbyPatch.dll
  DLL_OUTPUT_DIR: Build/bin/Release/net8.0
  PUBLISH_STATE_FILE: .github/emby-publish-state.json

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      count: ${{ steps.detect.outputs.count }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Detect tags to publish
        id: detect
        env:
          MANUAL_EMBY_TAG: ${{ github.event.inputs.emby_tag || '' }}
          MANUAL_RELEASE_TAG: ${{ github.event.inputs.release_tag || '' }}
          FORCE_PUBLISH_INPUT: ${{ github.event.inputs.force_publish || 'false' }}
          GITHUB_API_TOKEN: ${{ secrets.RELEASE_MIRROR_TOKEN }}
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          from pathlib import Path
          import ssl
          import urllib.error
          import urllib.request

          source_repo = os.environ["SOURCE_REPO"]
          dll_release_repo = os.environ["DLL_RELEASE_REPO"]
          state_file = Path(os.environ["PUBLISH_STATE_FILE"])
          manual_tag = os.environ.get("MANUAL_EMBY_TAG", "").strip()
          manual_release_tag = os.environ.get("MANUAL_RELEASE_TAG", "").strip()
          force_publish = os.environ.get("FORCE_PUBLISH_INPUT", "").strip().lower() == "true"
          github_api_token = os.environ.get("GITHUB_API_TOKEN", "").strip()

          ctx = ssl.create_default_context()

          def get_json(url: str):
              headers = {
                  "Accept": "application/vnd.github+json" if "api.github.com" in url else "application/json",
              }
              if "api.github.com" in url:
                  headers["X-GitHub-Api-Version"] = "2022-11-28"
                  if github_api_token:
                      headers["Authorization"] = f"Bearer {github_api_token}"
              request = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(request, context=ctx) as response:
                  return json.load(response)

          def normalize_platform(platform: str | None, architecture: str | None, variant: str | None) -> str:
              value = (platform or "").strip().lower() or "linux"
              arch = (architecture or "").strip().lower() or "unknown"
              arch_variant = (variant or "").strip().lower()

              key = f"{value}/{arch}"
              if arch_variant:
                  key = f"{key}/{arch_variant}"
              return key

          def get_tag_digests(repo: str, tag: str):
              url = f"https://hub.docker.com/v2/repositories/{repo}/tags/{tag}"
              try:
                  payload = get_json(url)
              except urllib.error.HTTPError as exc:
                  if exc.code == 404:
                      return None
                  raise

              images = payload.get("images") or []
              digests = {}
              for item in images:
                  digest = (item.get("digest") or "").strip()
                  if not digest:
                      continue
                  platform_key = normalize_platform(item.get("os"), item.get("architecture"), item.get("variant"))
                  digests[platform_key] = digest
              if digests:
                  return dict(sorted(digests.items()))

              digest = (payload.get("digest") or "").strip()
              if digest:
                  return {"manifest": digest}
              return None

          def is_stable_version(tag: str) -> bool:
              lowered = tag.lower()
              if lowered in {"latest", "beta"}:
                  return False
              if "-" in tag:
                  return False
              return all(part.isdigit() for part in tag.split("."))

          def get_latest_stable_tag():
              url = f"https://hub.docker.com/v2/repositories/{source_repo}/tags?page_size=100&ordering=last_updated"
              payload = get_json(url)
              for item in payload.get("results", []):
                  name = item.get("name", "").strip()
                  if name and is_stable_version(name):
                      return name
              raise SystemExit(f"No stable {source_repo} tag found")

          def get_latest_release_tag():
              payload = get_json(f"https://api.github.com/repos/{dll_release_repo}/releases/latest")
              tag_name = (payload.get("tag_name") or "").strip()
              if not tag_name:
                  raise SystemExit(f"No latest release tag found for {dll_release_repo}")
              return tag_name

          def load_state():
              if not state_file.exists():
                  return {}
              with state_file.open("r", encoding="utf-8") as fh:
                  payload = json.load(fh)
              return payload if isinstance(payload, dict) else {}

          tracked_tags = [manual_tag] if manual_tag else ["latest", "beta", get_latest_stable_tag()]
          release_tag = manual_release_tag or get_latest_release_tag()
          state = load_state()

          seen = set()
          entries = []
          for tag in tracked_tags:
              if not tag or tag in seen:
                  continue
              seen.add(tag)

              source_digests = get_tag_digests(source_repo, tag)
              if not source_digests:
                  raise SystemExit(f"Source tag not found: {source_repo}:{tag}")

              recorded = state.get(tag) if isinstance(state.get(tag), dict) else {}
              recorded_digests = recorded.get("source") if isinstance(recorded.get("source"), dict) else {}
              recorded_digests = dict(sorted(recorded_digests.items()))
              recorded_release_tag = str(recorded.get("release_tag") or "").strip()
              changed = (
                  force_publish
                  or source_digests != recorded_digests
                  or release_tag != recorded_release_tag
              )

              if changed:
                  entries.append({
                      "tag": tag,
                      "source_digests": source_digests,
                      "recorded_digests": recorded_digests,
                      "release_tag": release_tag,
                      "recorded_release_tag": recorded_release_tag,
                  })

          print(f"matrix={json.dumps({'include': entries}, separators=(',', ':'))}")
          print(f"count={len(entries)}")
          PY

  publish:
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.count != '0'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Log sync decision
        shell: bash
        run: |
          echo "Publishing ${IMAGE_REPO}:${{ matrix.tag }}"
          echo 'Source digests: ${{ toJson(matrix.source_digests) }}'
          echo "Bundled release: ${{ matrix.release_tag }}"
          if [[ '${{ toJson(matrix.recorded_digests) }}' != '{}' ]]; then
            echo 'Recorded digests: ${{ toJson(matrix.recorded_digests) }}'
          else
            echo "Recorded digests: <missing>"
          fi
          if [[ -n '${{ matrix.recorded_release_tag }}' ]]; then
            echo "Recorded bundled release: ${{ matrix.recorded_release_tag }}"
          else
            echo "Recorded bundled release: <missing>"
          fi

      - name: Download release DLL
        env:
          GH_TOKEN: ${{ secrets.RELEASE_MIRROR_TOKEN }}
        shell: bash
        run: |
          mkdir -p "${DLL_OUTPUT_DIR}"
          gh release download "${{ matrix.release_tag }}" \
            --repo "${DLL_RELEASE_REPO}" \
            --pattern "${DLL_ASSET_NAME}" \
            --dir "${DLL_OUTPUT_DIR}" \
            --clobber
          test -f "${DLL_OUTPUT_DIR}/${DLL_ASSET_NAME}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPO }}
          tags: |
            type=raw,value=${{ matrix.tag }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/emby/Dockerfile
          push: true
          build-args: |
            EMBY_TAG=${{ matrix.tag }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  update-state:
    runs-on: ubuntu-latest
    needs:
      - detect
      - publish
    if: needs.detect.outputs.count != '0' && needs.publish.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Update stored publish state
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import re
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          state_file = Path(os.environ["PUBLISH_STATE_FILE"])
          readme_file = Path("README.md")
          matrix = json.loads("""${{ needs.detect.outputs.matrix }}""")
          entries = matrix.get("include") or []

          if state_file.exists():
              with state_file.open("r", encoding="utf-8") as fh:
                  state = json.load(fh)
              if not isinstance(state, dict):
                  state = {}
          else:
              state = {}

          now = datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z")

          for entry in entries:
              tag = entry["tag"]
              state[tag] = {
                  "release_tag": entry["release_tag"],
                  "published_at": now,
                  "source": dict(sorted(entry["source_digests"].items())),
              }

          state_file.parent.mkdir(parents=True, exist_ok=True)
          with state_file.open("w", encoding="utf-8") as fh:
              json.dump(state, fh, indent=2, sort_keys=True)
              fh.write("\n")

          marker_start = "<!-- publish-state:start -->"
          marker_end = "<!-- publish-state:end -->"

          def sort_key(item):
              tag = item[0]
              order = {"beta": 0, "latest": 1}
              if tag in order:
                  return (order[tag], "")

              parts = tag.split(".")
              if all(part.isdigit() for part in parts):
                  version_key = tuple(-int(part) for part in parts)
                  return (2, version_key)

              return (3, tag)

          table_lines = [
              "| Tag | Published At (UTC+8) | Platforms |",
              "| --- | --- | --- |",
          ]

          tz_utc8 = timezone(timedelta(hours=8))

          for tag, payload in sorted(state.items(), key=sort_key):
              if not isinstance(payload, dict):
                  continue
              published_at_raw = str(payload.get("published_at") or "").strip()
              published_at = "-"
              if published_at_raw:
                  try:
                      published_at = (
                          datetime.fromisoformat(published_at_raw.replace("Z", "+00:00"))
                          .astimezone(tz_utc8)
                          .strftime("%Y-%m-%d %H:%M:%S")
                      )
                  except ValueError:
                      published_at = published_at_raw
              source = payload.get("source") if isinstance(payload.get("source"), dict) else {}
              platforms = ", ".join(sorted(source)) if source else "-"
              table_lines.append(f"| {tag} | {published_at} | {platforms} |")

          replacement = "\n".join([marker_start, *table_lines, marker_end])
          content = readme_file.read_text(encoding="utf-8")
          pattern = rf"{re.escape(marker_start)}.*?{re.escape(marker_end)}"

          if re.search(pattern, content, flags=re.S):
              content = re.sub(pattern, replacement, content, count=1, flags=re.S)
          else:
              section = "## 发布状态\n\n" + replacement + "\n\n"
              content = content.replace("## Docker Compose 示例\n\n", section + "## Docker Compose 示例\n\n", 1)

          readme_file.write_text(content, encoding="utf-8")
          PY

      - name: Commit publish state
        shell: bash
        run: |
          if git diff --quiet -- "${PUBLISH_STATE_FILE}" README.md; then
            echo "Publish state and README are up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${PUBLISH_STATE_FILE}" README.md
          git commit -m "Update Emby publish state"
          git push
